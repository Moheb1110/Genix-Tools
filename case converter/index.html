<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter | Genix Tools</title>
    <meta name="description"
        content="Convert your text to Uppercase, Lowercase, Sentence case, and more instantly with Genix Tools.">
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="https://moheb1110.github.io/Genix-Tools/logo-removebg-preview.png">

    <style>
        .text-area {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 20px;
            outline: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-tool {
            flex: 1;
            min-width: 140px;
            padding: 10px;
            background: var(--tool-card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-tool:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a href="../" class="logo">
                <img src="../logo-removebg-preview.png" alt="Genix Tools Logo" style="width: 40px; height: 40px;">
                Genix<span>Tools</span>
            </a>
            <div class="nav-links">
                <a href="../typing-test/">Typing Test</a>
                <a href="../word-counter/">Word Counter</a>
                <a href="../bmi-calculator/">BMI</a>
                <a href="../age-calculator/">Age Calc</a>
                <a href="../password-generator/">Password Gen</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-hero">
            <h1>🔠 Case <em>Converter</em></h1>
            <p>Easily transform your text between different letter cases.</p>
        </div>

        <div class="container">
            <div class="tool-card">
                <textarea id="text-input" class="text-area" placeholder="Type or paste your text here..."></textarea>

                <div class="controls">
                    <button class="btn-tool" onclick="convert('upper')">UPPERCASE</button>
                    <button class="btn-tool" onclick="convert('lower')">lowercase</button>
                    <button class="btn-tool" onclick="convert('sentence')">Sentence case</button>
                    <button class="btn-tool" onclick="convert('capitalized')">Capitalized Case</button>
                    <button class="btn-tool" onclick="copyText()"
                        style="background: var(--accent); color: white; border: none;">Copy to Clipboard</button>
                    <button class="btn-tool" onclick="clearText()"
                        style="background: #f44336; color: white; border: none; max-width: 80px;">Clear</button>
                </div>

                <div class="stats" id="char-stats">Character count: 0</div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 <strong>Genix Tools</strong> · <a href="../about.html">About</a></p>
    </footer>

    <script>
        const textArea = document.getElementById('text-input');
        const stats = document.getElementById('char-stats');

        textArea.addEventListener('input', () => {
            stats.innerText = `Character count: ${textArea.value.length}`;
        });

        function convert(type) {
            let str = textArea.value;
            if (!str) return;

            switch (type) {
                case 'upper':
                    textArea.value = str.toUpperCase();
                    break;
                case 'lower':
                    textArea.value = str.toLowerCase();
                    break;
                case 'sentence':
                    textArea.value = str.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
                    break;
                case 'capitalized':
                    textArea.value = str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    break;
            }
        }

        function copyText() {
            textArea.select();
            document.execCommand('copy');
            alert('Text copied to clipboard!');
        }

        function clearText() {
            textArea.value = '';
            stats.innerText = 'Character count: 0';
        }
    </script>
</body>

</html>
